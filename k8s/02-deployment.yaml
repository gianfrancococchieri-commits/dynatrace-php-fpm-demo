apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynatrace-php-demo
  namespace: mynamespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynatrace-php-demo
  template:
    metadata:
      labels:
        app: dynatrace-php-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: php-code
              mountPath: /var/www/html
        - name: php-fpm
          image: ghcr.io/gianfrancococchieri-commits/dynatrace-php-customservice-demo:1.0.0
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: php-code
              mountPath: /var/www/html
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf
        - name: php-code
          emptyDir: {}
