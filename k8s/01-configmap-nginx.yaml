apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: mynamespace
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        root /var/www/html;
        index index.php;

        location / {
          try_files $uri /index.php;
        }
        location ~ \.php$ {
          include /etc/nginx/fastcgi_params;
          fastcgi_pass 127.0.0.1:9000;
          fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        }
      }
    }
