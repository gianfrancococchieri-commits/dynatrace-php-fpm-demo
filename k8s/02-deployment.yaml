apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynatrace-php-demo
  namespace: mynamespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynatrace-php-demo
  template:
    metadata:
      labels:
        app: dynatrace-php-demo
    spec:
      containers:
        - name: php-fpm
          image: ghcr.io/gianfrancococchieri-commits/dynatrace-php-demo:latest
          imagePullPolicy: Always

        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf
