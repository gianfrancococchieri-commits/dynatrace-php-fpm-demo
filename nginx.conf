events {}
http {
  server {
    listen 80;
    root /var/www/html;
    index index.php;

    location / {
      try_files $uri /index.php;
    }

    location ~ \.php$ {
      include fastcgi_params;
      fastcgi_pass php:9000;
      fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    }
  }
}
